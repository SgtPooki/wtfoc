<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wtfoc</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --border: #262626;
  --text: #e0e0e0; --muted: #888; --dim: #555;
  --accent: #6366f1; --accent-dim: #4f46e5;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.app { max-width: 960px; margin: 0 auto; padding: 1rem; }
header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 span { color: var(--accent); }
.stats-bar { display: flex; gap: 1.5rem; margin-left: auto; font-size: 0.8rem; color: var(--muted); }
.stats-bar strong { color: var(--text); }

.search-container { margin-bottom: 1.5rem; }
.search-row { display: flex; gap: 0.5rem; }
.search-row input {
  flex: 1; padding: 0.6rem 1rem; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 0.95rem; outline: none;
}
.search-row input:focus { border-color: var(--accent); }
.search-row button {
  padding: 0.6rem 1.2rem; background: var(--accent); color: white; border: none;
  border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 500;
}
.search-row button:hover { background: var(--accent-dim); }
.mode-toggle { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
.mode-toggle label {
  font-size: 0.8rem; color: var(--muted); cursor: pointer; padding: 0.3rem 0.7rem;
  border: 1px solid var(--border); border-radius: 4px;
}
.mode-toggle input { display: none; }
.mode-toggle label:has(input:checked) { border-color: var(--accent); color: var(--accent); }

.loading { text-align: center; padding: 2rem; color: var(--muted); }
.results-header { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.75rem; }

.badge {
  display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 3px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
}
.badge-code { background: #1a3a1a; color: #4ade80; }
.badge-markdown { background: #1a2a3a; color: #60a5fa; }
.badge-github-issue { background: #3a2a1a; color: #fb923c; }
.badge-github-pr { background: #2a1a3a; color: #c084fc; }
.badge-github-pr-comment { background: #2a1a2a; color: #e879f9; }
.badge-doc-page { background: #1a3a3a; color: #2dd4bf; }
.badge-slack-message { background: #3a3a1a; color: #facc15; }
.badge-discord-message { background: #1a1a3a; color: #818cf8; }

.hop {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 0.75rem 1rem; margin-bottom: 0.5rem;
}
.hop-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
.hop-source { font-size: 0.8rem; color: var(--muted); }
.hop-connection {
  font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 3px;
  background: #1a1a2a; color: #818cf8;
}
.hop-connection.semantic { background: #1a2a1a; color: #4ade80; }
.hop-content {
  font-size: 0.85rem; line-height: 1.5; color: var(--text); max-height: 6rem;
  overflow: hidden; position: relative; white-space: pre-wrap; cursor: pointer;
}
.hop-content.expanded { max-height: none; }

.group { margin-bottom: 1.5rem; }
.group-header {
  font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.group-count { font-size: 0.75rem; color: var(--muted); font-weight: 400; }

.edge-panel {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 1rem; margin-top: 1.5rem;
}
.edge-panel h3 { font-size: 0.9rem; margin-bottom: 0.5rem; }
.edge-bar { height: 6px; background: var(--border); border-radius: 3px; margin: 0.5rem 0; overflow: hidden; }
.edge-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; }
.edge-detail { font-size: 0.8rem; color: var(--muted); }

.empty { text-align: center; padding: 4rem 2rem; }
.empty h2 { font-size: 1.3rem; margin-bottom: 0.5rem; }
.empty p { color: var(--muted); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span>wtf</span>oc</h1>
    <div class="stats-bar" id="stats"></div>
  </header>

  <div class="search-container">
    <div class="search-row">
      <input type="text" id="q" placeholder="Trace a question across all sources..." autofocus>
      <button id="go">Trace</button>
    </div>
    <div class="mode-toggle">
      <label><input type="radio" name="mode" value="trace" checked><span>Trace</span></label>
      <label><input type="radio" name="mode" value="query"><span>Search</span></label>
    </div>
  </div>

  <div id="results">
    <div class="empty">
      <h2>Trace anything</h2>
      <p>Ask a question to trace evidence across code, issues, PRs, docs, and chat.</p>
    </div>
  </div>

  <div id="edges"></div>
</div>

<script>
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const API = window.location.origin;

function escText(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.textContent;
}

function createBadge(sourceType) {
  const el = document.createElement('span');
  el.className = `badge badge-${escText(sourceType)}`;
  el.textContent = sourceType.replace(/-/g, ' ');
  return el;
}

function createHopCard(hop) {
  const card = document.createElement('div');
  card.className = 'hop';

  const header = document.createElement('div');
  header.className = 'hop-header';
  header.appendChild(createBadge(hop.sourceType));

  const source = document.createElement('span');
  source.className = 'hop-source';
  if (hop.sourceUrl) {
    const link = document.createElement('a');
    link.href = hop.sourceUrl;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = hop.source;
    source.appendChild(link);
  } else {
    source.textContent = hop.source;
  }
  header.appendChild(source);

  const conn = document.createElement('span');
  const c = hop.connection;
  conn.className = `hop-connection ${c.method === 'semantic' ? 'semantic' : ''}`;
  conn.textContent = c.method === 'edge'
    ? `${c.edgeType} edge (${Math.round(c.confidence * 100)}%)`
    : `semantic (${Math.round(c.confidence * 100)}%)`;
  header.appendChild(conn);

  const content = document.createElement('div');
  content.className = 'hop-content';
  content.textContent = hop.content;
  content.addEventListener('click', () => content.classList.toggle('expanded'));

  card.appendChild(header);
  card.appendChild(content);
  return card;
}

function clearEl(el) { while (el.firstChild) el.removeChild(el.firstChild); }

async function doSearch() {
  const q = $('#q').value.trim();
  if (!q) return;
  const mode = document.querySelector('input[name="mode"]:checked').value;
  const results = $('#results');

  clearEl(results);
  const loading = document.createElement('div');
  loading.className = 'loading';
  loading.textContent = 'Searching...';
  results.appendChild(loading);

  try {
    const url = `${API}/api/${encodeURIComponent(mode)}?q=${encodeURIComponent(q)}`;
    const res = await fetch(url);
    const data = await res.json();
    clearEl(results);

    if (mode === 'trace') {
      renderTrace(data, results);
    } else {
      renderQuery(data, results);
    }
  } catch (err) {
    clearEl(results);
    const errEl = document.createElement('div');
    errEl.className = 'loading';
    errEl.textContent = `Error: ${err.message}`;
    results.appendChild(errEl);
  }
}

function renderTrace(data, container) {
  const { stats, groups } = data;

  const header = document.createElement('div');
  header.className = 'results-header';
  header.textContent = `${stats.totalHops} results across ${stats.sourceTypes.length} source types (${stats.edgeHops} via edges, ${stats.semanticHops} semantic)`;
  container.appendChild(header);

  for (const [sourceType, hops] of Object.entries(groups)) {
    const group = document.createElement('div');
    group.className = 'group';

    const gh = document.createElement('div');
    gh.className = 'group-header';
    gh.appendChild(createBadge(sourceType));
    const count = document.createElement('span');
    count.className = 'group-count';
    count.textContent = `${hops.length} results`;
    gh.appendChild(count);
    group.appendChild(gh);

    for (const hop of hops) group.appendChild(createHopCard(hop));
    container.appendChild(group);
  }
}

function renderQuery(data, container) {
  if (!data.results || data.results.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'loading';
    empty.textContent = 'No results found.';
    container.appendChild(empty);
    return;
  }

  const header = document.createElement('div');
  header.className = 'results-header';
  header.textContent = `${data.results.length} results`;
  container.appendChild(header);

  for (const r of data.results) {
    const hop = {
      sourceType: r.entry?.metadata?.sourceType || 'unknown',
      source: r.entry?.metadata?.source || '',
      sourceUrl: r.entry?.metadata?.sourceUrl || '',
      content: r.entry?.metadata?.content || '',
      connection: { method: 'semantic', confidence: r.score },
    };
    container.appendChild(createHopCard(hop));
  }
}

// Load status
fetch(`${API}/api/status`).then(r => r.json()).then(data => {
  const el = $('#stats');
  clearEl(el);
  const items = [
    [`${(data.totalChunks/1000).toFixed(1)}K`, 'chunks'],
    [data.segments, 'segments'],
    [data.sourceTypes?.length || '?', 'source types'],
  ];
  for (const [val, label] of items) {
    const span = document.createElement('span');
    const strong = document.createElement('strong');
    strong.textContent = val;
    span.appendChild(strong);
    span.append(` ${label}`);
    el.appendChild(span);
  }
});

// Load edge stats
fetch(`${API}/api/edges`).then(r => r.json()).then(data => {
  const panel = $('#edges');
  clearEl(panel);

  const div = document.createElement('div');
  div.className = 'edge-panel';

  const h3 = document.createElement('h3');
  h3.textContent = 'Edge Coverage';
  div.appendChild(h3);

  const bar = document.createElement('div');
  bar.className = 'edge-bar';
  const fill = document.createElement('div');
  fill.className = 'edge-bar-fill';
  fill.style.width = `${data.resolution}%`;
  bar.appendChild(fill);
  div.appendChild(bar);

  const detail = document.createElement('div');
  detail.className = 'edge-detail';
  detail.textContent = `${data.resolvedEdges.toLocaleString()} of ${data.totalEdges.toLocaleString()} edges resolved (${data.resolution}%) \u00B7 ${data.bareRefs} bare refs`;
  div.appendChild(detail);

  panel.appendChild(div);
});

// Event handlers
$('#go').addEventListener('click', doSearch);
$('#q').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
$$('input[name="mode"]').forEach(r => r.addEventListener('change', () => {
  $('#go').textContent = document.querySelector('input[name="mode"]:checked').value === 'trace' ? 'Trace' : 'Search';
}));
</script>
</body>
</html>
