name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        if: github.event_name == 'push'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, load locally, smoke-test, then push. Second build hits GHA cache.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: wtfoc:smoke-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (server startup + MCP initialize)
        run: |
          cid=$(docker run -d -p 3577:3577 "wtfoc:smoke-${{ github.sha }}")
          cleanup() {
            docker logs "$cid" || true
            docker rm -f "$cid" || true
          }
          trap cleanup EXIT

          for i in $(seq 1 60); do
            if curl -fs http://127.0.0.1:3577/api/collections >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:3577/api/collections >/dev/null
          curl -fsS \
            -X POST \
            -H 'content-type: application/json' \
            -H 'accept: application/json, text/event-stream' \
            --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-05","capabilities":{},"clientInfo":{"name":"github-actions","version":"0.1.0"}}}' \
            http://127.0.0.1:3577/mcp >/dev/null

      - name: Build and push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
