name: Docker

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Use the triggering commit SHA consistently across all steps
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Only run if CI succeeded (workflow_run) or this is a tag push
    if: >-
      github.event_name == 'push' ||
      (github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, load locally, smoke-test, then push. Second build hits GHA cache.
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: wtfoc:smoke-${{ env.COMMIT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (TransformersEmbedder + hosted /mcp)
        run: |
          docker run --rm \
            -w /app/apps/web \
            -v "${GITHUB_WORKSPACE}/apps/web/smoke-embed.mjs:/app/apps/web/smoke-embed.mjs:ro" \
            -v "${GITHUB_WORKSPACE}/apps/web/smoke-mcp.mjs:/app/apps/web/smoke-mcp.mjs:ro" \
            "wtfoc:smoke-${COMMIT_SHA}" \
            sh -lc "node smoke-embed.mjs && node smoke-mcp.mjs"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
