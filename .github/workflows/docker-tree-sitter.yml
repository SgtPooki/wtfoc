name: Docker (tree-sitter-parser)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  push:
    tags: ["v*"]
    paths:
      - "docker/tree-sitter-parser/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-tree-sitter-parser
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: docker/tree-sitter-parser
          push: false
          load: true
          tags: tree-sitter-parser:smoke
          cache-from: type=gha,scope=tree-sitter-parser
          cache-to: type=gha,mode=max,scope=tree-sitter-parser

      - name: Smoke test (health + parse)
        run: |
          docker run -d --name ts-smoke -p 8384:8080 tree-sitter-parser:smoke
          sleep 3

          # Health check
          curl -sf http://localhost:8384/health | jq .
          LANGS=$(curl -sf http://localhost:8384/health | jq -r '.languages | length')
          if [ "$LANGS" -lt 8 ]; then
            echo "Expected at least 8 languages, got $LANGS"
            docker logs ts-smoke
            exit 1
          fi

          # Parse check (JavaScript)
          EDGES=$(curl -sf -X POST http://localhost:8384/parse \
            -H 'Content-Type: application/json' \
            -d '{"language":"javascript","content":"import { foo } from \"bar\";"}' \
            | jq '.edges | length')
          if [ "$EDGES" -lt 1 ]; then
            echo "Expected at least 1 edge, got $EDGES"
            exit 1
          fi

          docker stop ts-smoke && docker rm ts-smoke

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/tree-sitter-parser
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=tree-sitter-parser
          cache-to: type=gha,mode=max,scope=tree-sitter-parser
