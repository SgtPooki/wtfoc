# Docker Compose for wtfoc local development.
#
# Start the tree-sitter parser sidecar for AST-based code analysis:
#   docker compose up tree-sitter-parser
#
# Then use the CLI with:
#   wtfoc ingest --tree-sitter-url http://localhost:8384 ...
#
# Or set the env var:
#   export WTFOC_TREE_SITTER_URL=http://localhost:8384

services:
  bge-reranker:
    build:
      context: docker/bge-reranker
      dockerfile: Dockerfile
    ports:
      - "8385:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3

  tree-sitter-parser:
    build:
      context: docker/tree-sitter-parser
      dockerfile: Dockerfile
    ports:
      - "8384:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3
